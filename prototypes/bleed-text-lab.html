<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מעבדת פול בליד וצבע טקסט</title>
    <script>
      globalThis.__SUN_BLEED_LAB__ = true;
      /* Block Live Server auto-reload loop */
      (function () {
        var blocked = 0;
        location.reload = function () {
          blocked++;
          console.warn("[bleed-text-lab] location.reload blocked #" + blocked);
        };
        var NativeWS = WebSocket;
        WebSocket = function (url, protocols) {
          var s = String(url);
          if (s.indexOf("/ws") !== -1) {
            blocked++;
            console.warn("[bleed-text-lab] livereload WebSocket blocked #" + blocked, s);
            return {
              close: function () {},
              send: function () {},
              addEventListener: function () {},
              removeEventListener: function () {},
              readyState: 3,
            };
          }
          return new NativeWS(url, protocols);
        };
      })();
    </script>
    <link rel="stylesheet" href="sun-map/sun-map.css" />
    <link rel="stylesheet" href="bleed-text-lab.css" />
  </head>
  <body class="bleed-text-lab">
    <aside class="bleed-text-lab-panel" id="bleed-text-lab-panel" aria-label="בקרת מעבדה">
      <h1>מעבדת פול בליד</h1>
      <p class="bleed-text-lab-panel__intro">
        בחרי מונח, נסי תמונות וצבעי טקסט, שמרי לתור — ואז החילי על האתר.
      </p>

      <div class="bleed-text-lab-field">
        <label for="bleed-lab-term-search">מונח</label>
        <input
          type="search"
          id="bleed-lab-term-search"
          placeholder="חיפוש מונח…"
          autocomplete="off"
        />
        <select id="bleed-lab-term-select" size="6" aria-label="רשימת מונחים"></select>
      </div>

      <button type="button" class="bleed-text-lab-btn bleed-text-lab-btn--primary" id="bleed-lab-show">
        הצג במפה
      </button>

      <div class="bleed-text-lab-field" style="margin-top: 14px">
        <label>תמונת פול בליד</label>
        <div class="bleed-text-lab-images" id="bleed-lab-images"></div>
      </div>

      <div class="bleed-text-lab-field">
        <label>צבע טקסט — ניווט</label>
        <div class="bleed-text-lab-segment" data-pref="navText">
          <button type="button" data-value="auto" class="is-active">אוטומטי</button>
          <button type="button" data-value="dark">שחור</button>
          <button type="button" data-value="light">לבן</button>
        </div>
      </div>

      <div class="bleed-text-lab-field">
        <label>צבע טקסט — שורה מודגשת</label>
        <div class="bleed-text-lab-segment" data-pref="titleRowText">
          <button type="button" data-value="auto" class="is-active">אוטומטי</button>
          <button type="button" data-value="dark">שחור</button>
          <button type="button" data-value="light">לבן</button>
        </div>
      </div>

      <p class="bleed-text-lab-status" id="bleed-lab-status">טוען מפה…</p>

      <div class="bleed-text-lab-actions">
        <button type="button" class="bleed-text-lab-btn" id="bleed-lab-save-term">שמור מונח</button>
        <button type="button" class="bleed-text-lab-btn bleed-text-lab-btn--primary" id="bleed-lab-apply">
          החל על האתר
        </button>
      </div>

      <p class="bleed-text-lab-hint" id="bleed-lab-apply-hint" hidden></p>
      <p class="bleed-text-lab-queue" id="bleed-lab-queue"></p>
    </aside>

    <div id="sun-bleed-backdrop" class="sun-bleed-backdrop" hidden aria-hidden="true">
      <img class="sun-bleed-backdrop__img" alt="" decoding="async" referrerpolicy="no-referrer" />
    </div>
    <div class="sun-app">
      <div class="sun-viewport" id="sun-viewport">
        <svg id="sun-svg" class="sun-svg" aria-hidden="true"></svg>
        <div id="sun-loading" class="sun-loading" role="status" aria-live="polite">
          <div class="sun-loading__panel">
            <p class="sun-loading__label">טוען נתונים…</p>
            <div class="sun-loading__bar" aria-hidden="true">
              <div id="sun-loading-bar-fill" class="sun-loading__bar-fill"></div>
            </div>
            <p id="sun-loading-progress" class="sun-loading__progress"></p>
          </div>
        </div>
        <div id="sun-error" class="sun-error hidden"></div>
        <div
          id="sun-terms-index-root"
          class="sun-terms-index"
          hidden
          aria-label="אינדקס מונחים לפי א״ב"
        ></div>
        <div
          id="sun-overview-terms-root"
          class="sun-terms-index sun-overview-terms-grid"
          hidden
          aria-label="מונחים לפי קבוצות"
        ></div>
        <div id="sun-title-row-image" class="sun-title-row-image" hidden aria-hidden="true">
          <img class="sun-title-row-image__img" alt="" decoding="async" referrerpolicy="no-referrer" />
        </div>
        <p
          id="sun-label-row-hover-heading"
          class="sun-label-row-hover-heading"
          hidden
          aria-hidden="true"
        ></p>
        <div
          id="sun-term-font-overlay"
          class="sun-term-font-overlay"
          hidden
          aria-hidden="true"
        >
          <span id="sun-term-font-overlay-term" class="sun-term-font-overlay__term"></span>
        </div>
        <div
          id="sun-term-similar-label-wrap"
          class="sun-term-similar-label-wrap"
          hidden
          aria-hidden="true"
        >
          <p id="sun-term-similar-label" class="sun-term-similar-label">
            מונחים דומים:
          </p>
        </div>
        <p
          id="sun-term-bleed-caption"
          class="sun-term-bleed-caption"
          hidden
          aria-hidden="true"
        ></p>
        <div id="sun-term-meta" class="sun-term-meta" hidden>
          <div class="sun-term-meta__rows">
            <div class="sun-term-meta__row sun-term-meta__type" hidden>
              <h3 class="sun-term-meta__heading">סוג מונח</h3>
              <p class="sun-term-meta__value"></p>
            </div>
            <div class="sun-term-meta__row sun-term-meta__framing" hidden>
              <h3 class="sun-term-meta__heading">מסגור לשוני</h3>
              <p class="sun-term-meta__value"></p>
            </div>
            <div class="sun-term-meta__row sun-term-meta__connotation" hidden>
              <h3 class="sun-term-meta__heading">פעולה רגשית</h3>
              <p class="sun-term-meta__value"></p>
            </div>
          </div>
        </div>
        <div id="sun-term-page" class="sun-term-page" hidden>
          <p class="sun-term-page__definition"></p>
          <div class="sun-term-page__images" aria-label="תמונות"></div>
          <div class="sun-term-page__details" hidden>
            <div class="sun-term-page__side sun-term-page__emphasizes" hidden>
              <h3 class="sun-term-page__side-heading">מדגיש</h3>
              <p class="sun-term-page__side-text sun-term-page__emphasizes-text"></p>
            </div>
            <div class="sun-term-page__side sun-term-page__obscures" hidden>
              <h3 class="sun-term-page__side-heading">מטשטש</h3>
              <p class="sun-term-page__side-text sun-term-page__obscures-text"></p>
            </div>
          </div>
          <div
            id="sun-term-details-image"
            class="sun-term-page__details-image"
            hidden
            aria-hidden="true"
          ></div>
          <nav
            id="sun-term-label-nav"
            class="sun-term-page__label-nav"
            hidden
            aria-label="מידע על המונח"
          ></nav>
          <div class="sun-term-page__label-row sun-term-page__users" hidden>
            <h3 class="sun-term-page__side-heading sun-term-page__label-row-heading">משתמשים</h3>
            <p class="sun-term-page__side-text sun-term-page__label-row-text"></p>
          </div>
          <div class="sun-term-page__label-row sun-term-page__contexts" hidden>
            <h3 class="sun-term-page__side-heading sun-term-page__label-row-heading">נפוץ</h3>
            <p class="sun-term-page__side-text sun-term-page__label-row-text"></p>
          </div>
          <div class="sun-term-page__label-row sun-term-page__period" hidden>
            <h3 class="sun-term-page__side-heading sun-term-page__label-row-heading">בשימוש</h3>
            <p class="sun-term-page__side-text sun-term-page__label-row-text"></p>
          </div>
        </div>
        <div
          id="sun-term-header-backdrop"
          class="sun-term-header-backdrop"
          hidden
          aria-hidden="true"
        ></div>
        <div
          id="sun-term-scroll-bg"
          class="sun-term-scroll-bg"
          hidden
          aria-hidden="true"
        ></div>
        <div id="sun-scroll-spacer" class="sun-scroll-spacer" aria-hidden="true"></div>
        <div class="sun-grid is-hidden" id="sun-grid" aria-hidden="true">
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
          <div class="sun-grid__col"></div>
        </div>
      </div>
      <svg id="sun-back-fixed" class="sun-back-fixed" aria-hidden="true"></svg>
    </div>

    <script type="module" src="../js/sun-map.js"></script>
    <script type="module" src="../js/bleed-text-lab.js"></script>
  </body>
</html>
